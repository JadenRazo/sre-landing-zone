name: terraform plan

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/plan.yml'

# Required for OIDC: GitHub injects the JWT into the workflow run context
# when this is set. Without `id-token: write`, configure-aws-credentials
# returns InvalidIdentityToken.
permissions:
  id-token: write
  contents: read
  pull-requests: write   # to comment plan output back on the PR

jobs:
  detect-changed-phases:
    name: detect changed phases
    runs-on: ubuntu-latest
    outputs:
      phases: ${{ steps.changes.outputs.phases }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        name: list changed phase directories
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- infra/ \
            | grep -oE '^infra/[^/]+/' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "phases=$changed" >> "$GITHUB_OUTPUT"
          echo "Changed phases: $changed"

  plan:
    name: plan ${{ matrix.phase }}
    needs: detect-changed-phases
    if: needs.detect-changed-phases.outputs.phases != '[]' && needs.detect-changed-phases.outputs.phases != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        phase: ${{ fromJSON(needs.detect-changed-phases.outputs.phases) }}
    steps:
      - uses: actions/checkout@v4

      - name: setup terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.9

      - name: configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-west-2
          role-session-name: gh-plan-${{ github.run_id }}

      - name: terraform init
        working-directory: ${{ matrix.phase }}
        run: terraform init -input=false -backend=false

      - name: terraform validate
        working-directory: ${{ matrix.phase }}
        run: terraform validate

      - name: terraform fmt check
        working-directory: ${{ matrix.phase }}
        run: terraform fmt -check -recursive

      - name: terraform plan
        id: plan
        working-directory: ${{ matrix.phase }}
        run: |
          # Most phases need an alert_email var or similar; pass through if set.
          terraform init -input=false
          terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt

      - name: comment plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ matrix.phase }}/plan.txt', 'utf8');
            // Truncate huge plans so we don't bloat PR comments
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n... [truncated, full plan in run logs]'
              : plan;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### \`${{ matrix.phase }}\` plan\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n</details>`
            });
