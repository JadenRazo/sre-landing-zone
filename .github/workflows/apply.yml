name: terraform apply

# AUTO-TRIGGER ON PUSH IS DISABLED until the project migrates to S3 remote
# state (see infra/_backend/README.md). With local state, the runner starts
# empty each run and would try to re-create resources that already exist —
# half-fails with "already exists" errors and leaves things in a worse state.
#
# Until then: trigger manually via `gh workflow run "terraform apply" --ref main \
#   -f phase=infra/02-workload-dev` AFTER you've migrated the relevant phase.

on:
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase directory to apply (e.g. infra/02-workload-dev)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: apply ${{ github.event.inputs.phase }}
    runs-on: ubuntu-latest
    # GitHub Environment provides the manual approval gate. Configure required
    # reviewers in repo settings → Environments → "production". Until that's
    # configured the apply runs without a gate, which is fine for solo work
    # but unsafe for a team.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-west-2
          role-session-name: gh-apply-${{ github.run_id }}

      - name: terraform init
        working-directory: ${{ github.event.inputs.phase }}
        run: terraform init -input=false

      - name: terraform apply
        working-directory: ${{ github.event.inputs.phase }}
        run: terraform apply -auto-approve -input=false
